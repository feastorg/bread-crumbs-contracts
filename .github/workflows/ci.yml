name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cmake-package-smoke:
    runs-on: ubuntu-latest
    env:
      LINUX_WIRE_VERSION: "0.1.1"
      LINUX_WIRE_SHA256: "ad15ff7742e4b4108014096386ee01e2f89a9f74c77b2e42f4591c5371479bda"
      CRUMBS_VERSION: "0.12.4"
      CRUMBS_SHA256: "fbdad6d561b46ec95aa55d8b59fbf9f9ce770885c4601eee75852b14e33f424b"

    steps:
      - uses: actions/checkout@v7

      - name: Install linux-wire from release
        run: |
          mkdir -p _deps/linux-wire-install
          curl -fsSL "https://github.com/feastorg/linux-wire/releases/download/v${LINUX_WIRE_VERSION}/linux-wire-${LINUX_WIRE_VERSION}-linux-x86_64.tar.gz" \
            -o linux-wire.tar.gz
          echo "${LINUX_WIRE_SHA256}  linux-wire.tar.gz" | sha256sum -c -
          tar -xzf linux-wire.tar.gz -C _deps/linux-wire-install

      - name: Install CRUMBS from release
        run: |
          mkdir -p _deps/crumbs-install
          curl -fsSL "https://github.com/feastorg/CRUMBS/releases/download/v${CRUMBS_VERSION}/crumbs-${CRUMBS_VERSION}-linux-x86_64.tar.gz" \
            -o crumbs.tar.gz
          echo "${CRUMBS_SHA256}  crumbs.tar.gz" | sha256sum -c -
          tar -xzf crumbs.tar.gz -C _deps/crumbs-install

      - name: Build and install bread-crumbs-contracts package
        run: |
          cmake -S . -B build/contracts \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PWD/_deps/linux-wire-install;$PWD/_deps/crumbs-install" \
            -DCMAKE_INSTALL_PREFIX="$PWD/stage"
          cmake --build build/contracts --config Release --parallel
          ctest --test-dir build/contracts --output-on-failure
          cmake --install build/contracts

      - name: Consumer smoke test with find_package()
        run: |
          cmake -S tests/installed_package_consumer -B build/installed_package_consumer \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PWD/_deps/linux-wire-install;$PWD/_deps/crumbs-install;$PWD/stage"
          cmake --build build/installed_package_consumer --config Release --parallel
          ctest --test-dir build/installed_package_consumer --output-on-failure

      - name: Build controller discovery example
        run: |
          cmake -S examples/controller_discovery -B build/controller_discovery \
            -DCMAKE_BUILD_TYPE=Release \
            -DCRUMBS_BUILD_IN_TREE=OFF \
            -DCMAKE_PREFIX_PATH="$PWD/_deps/linux-wire-install;$PWD/_deps/crumbs-install"
          cmake --build build/controller_discovery --config Release --parallel

      - name: Build controller manual example
        run: |
          cmake -S examples/controller_manual -B build/controller_manual \
            -DCMAKE_BUILD_TYPE=Release \
            -DCRUMBS_BUILD_IN_TREE=OFF \
            -DCMAKE_PREFIX_PATH="$PWD/_deps/linux-wire-install;$PWD/_deps/crumbs-install"
          cmake --build build/controller_manual --config Release --parallel

  # ─── Unified gate ─────────────────────────────────────────────
  # Branch protection requires only: CI / ok
  ok:
    name: ok
    if: always()
    needs: [cmake-package-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any upstream job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Pass
        run: echo 'All checks passed or were skipped'
