name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cmake-package-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install linux-wire from release
        run: |
          mkdir -p _deps/linux-wire-install
          curl -fsSL https://github.com/feastorg/linux-wire/releases/download/v0.1.1/linux-wire-0.1.1-linux-x86_64.tar.gz \
            | tar -xz -C _deps/linux-wire-install

      - name: Install CRUMBS from release
        run: |
          mkdir -p _deps/crumbs-install
          curl -fsSL https://github.com/feastorg/CRUMBS/releases/download/v0.12.1/crumbs-0.12.1-linux-x86_64.tar.gz \
            | tar -xz -C _deps/crumbs-install

      - name: Build and install bread-crumbs-contracts package
        run: |
          cmake -S . -B build/contracts \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PWD/_deps/linux-wire-install;$PWD/_deps/crumbs-install" \
            -DCMAKE_INSTALL_PREFIX="$PWD/stage"
          cmake --build build/contracts --config Release --parallel
          ctest --test-dir build/contracts --output-on-failure
          cmake --install build/contracts

      - name: Consumer smoke test with find_package()
        run: |
          mkdir -p build/smoke
          cat > build/smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.14)
          project(bread_contracts_smoke C)
          find_package(breadCrumbsContracts 0.4 CONFIG REQUIRED)
          add_executable(smoke main.c)
          target_link_libraries(smoke PRIVATE bread::contracts)
          EOF
          cat > build/smoke/main.c <<'EOF'
          #include <bread/bread_ops.h>
          #include <bread/bread_caps.h>

          int main(void) {
              return 0;
          }
          EOF
          cmake -S build/smoke -B build/smoke/out \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$PWD/_deps/linux-wire-install;$PWD/_deps/crumbs-install;$PWD/stage"
          cmake --build build/smoke/out --config Release --parallel

      - name: Build controller discovery example
        run: |
          cmake -S examples/controller_discovery -B build/controller_discovery \
            -DCMAKE_BUILD_TYPE=Release \
            -DCRUMBS_BUILD_IN_TREE=OFF \
            -DCMAKE_PREFIX_PATH="$PWD/_deps/linux-wire-install;$PWD/_deps/crumbs-install"
          cmake --build build/controller_discovery --config Release --parallel

      - name: Build controller manual example
        run: |
          cmake -S examples/controller_manual -B build/controller_manual \
            -DCMAKE_BUILD_TYPE=Release \
            -DCRUMBS_BUILD_IN_TREE=OFF \
            -DCMAKE_PREFIX_PATH="$PWD/_deps/linux-wire-install;$PWD/_deps/crumbs-install"
          cmake --build build/controller_manual --config Release --parallel

  # ─── Unified gate ─────────────────────────────────────────────
  # Branch protection requires only: CI / ok
  ok:
    name: ok
    if: always()
    needs: [cmake-package-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any upstream job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Pass
        run: echo 'All checks passed or were skipped'
