name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release (header-only)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential jq

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install CRUMBS from release
        run: |
          mkdir -p _deps/crumbs-install
          curl -fsSL https://github.com/feastorg/CRUMBS/releases/download/v0.12.1/crumbs-0.12.1-linux-x86_64.tar.gz \
            | tar -xz -C _deps/crumbs-install

      - name: Build and install bread-crumbs-contracts
        run: |
          cmake -S . -B build/contracts \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/_deps/crumbs-install" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/staging"
          cmake --build build/contracts --parallel
          cmake --install build/contracts

      - name: Consumer smoke test
        run: |
          mkdir -p build/smoke
          cat > build/smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.14)
          project(bread_contracts_smoke C)
          find_package(breadCrumbsContracts CONFIG REQUIRED)
          add_executable(smoke main.c)
          target_link_libraries(smoke PRIVATE bread::contracts)
          EOF
          cat > build/smoke/main.c <<'EOF'
          #include <bread/bread_ops.h>
          #include <bread/bread_caps.h>
          int main(void) { return 0; }
          EOF
          cmake -S build/smoke -B build/smoke/out \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/_deps/crumbs-install;${{ github.workspace }}/staging"
          cmake --build build/smoke/out --parallel

      - name: Package source tarball
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="bread-crumbs-contracts-${VERSION}-source.tar.gz"
          git archive --format=tar.gz \
            --prefix="bread-crumbs-contracts-${VERSION}/" \
            -o "${ARTIFACT}" HEAD
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: sha256sum bread-crumbs-contracts-*.tar.gz > SHA256SUMS

      - name: Generate manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="${{ steps.package.outputs.artifact }}"
          SHA=$(grep "${ARTIFACT}" SHA256SUMS | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "feastorg/bread-crumbs-contracts" \
            --arg component "bread-crumbs-contracts" \
            --arg version "${VERSION}" \
            --arg platform "any" \
            --arg asset "${ARTIFACT}" \
            --arg sha256 "${SHA}" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, platform: $platform, asset: $asset, sha256: $sha256}' \
            > manifest.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bread-crumbs-contracts-*.tar.gz
            SHA256SUMS
            manifest.json
          generate_release_notes: true

